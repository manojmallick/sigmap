name: Deploy GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

# PREREQUISITE (one-time, 30 seconds):
# GitHub Settings → Pages → Source → select "GitHub Actions" → Save

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: docs-vp/package-lock.json

      - name: Install & Build VitePress
        run: |
          cd docs-vp
          npm ci
          npm run docs:build

      - name: Upload built site as Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs-vp/.vitepress/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
