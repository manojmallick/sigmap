<svg xmlns="http://www.w3.org/2000/svg" width="100" height="100" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="100" y2="100" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#1a1740"/>
      <stop offset="100%" stop-color="#2e2070"/>
    </linearGradient>
    <linearGradient id="wave" x1="14" y1="50" x2="86" y2="50" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#c084fc"/>
    </linearGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="100" height="100" rx="19" fill="url(#bg)"/>
  <!-- Glow layer -->
  <path d="M 14 53 C 23 27, 42 27, 50 50 C 58 73, 77 73, 86 47"
        stroke="url(#wave)" stroke-width="7" fill="none"
        stroke-linecap="round" opacity="0.25" filter="url(#glow)"/>
  <!-- Main waveform -->
  <path d="M 14 53 C 23 27, 42 27, 50 50 C 58 73, 77 73, 86 47"
        stroke="url(#wave)" stroke-width="4.3" fill="none"
        stroke-linecap="round"/>
  <!-- Pin dots -->
  <circle cx="14" cy="53" r="4.3" fill="#818cf8" opacity="0.92"/>
  <circle cx="50" cy="50" r="5.5" fill="#a78bfa" opacity="0.92"/>
  <circle cx="86" cy="47" r="4.3" fill="#c084fc" opacity="0.92"/>
</svg>
